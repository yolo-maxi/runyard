# RunYard on dstack (Intel TDX confidential VM).
#
# This compose is the app-compose dstack runs inside the CVM guest (full dockerd
# in the guest). dstack-gateway terminates TLS and reverse-proxies to the hub on
# container port 80 — there is NO Caddy / no own-TLS in this stack.
#
# IMPORTANT — images MUST be pinned by @sha256: digest, never a mutable tag.
# dstack attestation measures this compose *text*; a :tag commits to the string,
# not the bytes. Digests only exist after the first CI push to GHCR, so the refs
# below are placeholders. After CI builds the images it emits both digests (job
# summary + release artifact); paste them in, then deploy/UpgradeApp.
#
# Updates are via dstack UpgradeApp (swap digests → new compose-hash → re-measure),
# NOT `docker compose pull` and NOT Watchtower. Rollback = UpgradeApp back to the
# previous digests. See DEPLOY-DSTACK.md.

services:
  hub:
    # REPLACE_WITH_DIGEST — e.g. ghcr.io/yolo-maxi/runyard-hub@sha256:<64-hex>
    image: ghcr.io/yolo-maxi/runyard-hub@sha256:REPLACE_WITH_HUB_DIGEST
    restart: unless-stopped
    # dstack-gateway proxies to container :80. Exposing 80 is enough; the
    # published host mapping is harmless inside the CVM and aids local testing.
    ports:
      - "80:80"
    environment:
      # The hub listens on 0.0.0.0:80 (read by src/env.js).
      HOST: "0.0.0.0"
      PORT: "80"
      NODE_ENV: "production"
      SMITHERS_HUB_DATA_DIR: "/data"
      SMITHERS_HUB_INSTANCE_NAME: "Runyard"
      # Public gateway URL for this app. Set to your app's gateway hostname so
      # https links and production-mode session handling are correct.
      #   BASE_URL: "https://<app_id>.gateway.attestmesh.xyz"
      BASE_URL: "${BASE_URL:-}"
      # Secrets via dstack ENCRYPTED env vars — referenced here, never inlined.
      # Provide these in the dstack app's encrypted-env, not in this file:
      SMITHERS_HUB_SESSION_SECRET: "${SMITHERS_HUB_SESSION_SECRET:-}"
      SMITHERS_HUB_BOOTSTRAP_TOKEN: "${SMITHERS_HUB_BOOTSTRAP_TOKEN:-}"
      # 32-byte key (base64/hex) enabling the encrypted reusable-secrets store.
      SECRETS_ENC_KEY: "${SECRETS_ENC_KEY:-}"
      # On dstack, APPLY = UpgradeApp. Keep the in-app update CHECK informational
      # only and disable the host-side self-update APPLY path.
      UPDATE_APPLY_ENABLED: "0"
    volumes:
      # Hub datastore on a named volume — survives container recreation & CVM
      # reboot on the KMS-encrypted per-CVM disk (NOT app destruction / RemoveVm).
      - hub-data:/data
    # Bound the hub within the CVM (limits the real ceiling is CVM-create sizing).
    cpus: "1.0"
    mem_limit: "1g"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:80/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  runner:
    # REPLACE_WITH_DIGEST — e.g. ghcr.io/yolo-maxi/runyard-runner@sha256:<64-hex>
    image: ghcr.io/yolo-maxi/runyard-runner@sha256:REPLACE_WITH_RUNNER_DIGEST
    restart: unless-stopped
    depends_on:
      - hub
    environment:
      # Reach the hub. On the same CVM/compose, the service name resolves.
      # Across separate CVMs, point at the hub's gateway URL or direct addr.
      SMITHERS_HUB_URL: "${SMITHERS_HUB_URL:-http://hub:80}"
      # Runner auth token — provide via dstack ENCRYPTED env (never inline).
      SMITHERS_HUB_TOKEN: "${SMITHERS_HUB_TOKEN:-}"
      SMITHERS_WORKSPACE: "/workspace"
      SMITHERS_RUNNER_LOCATION: "vps"
      SMITHERS_RUNNER_CONCURRENCY: "${SMITHERS_RUNNER_CONCURRENCY:-1}"
      # Pinned engine resolved deterministically (matches Dockerfile.runner).
      SMITHERS_BIN: "/usr/local/bun/bin/smithers"
      # Agent CLI credentials (claude/codex) — provide via dstack ENCRYPTED env.
      # The agent CLIs themselves are NOT baked into the image; mount/auth them.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Point the docker CLI at the guest dockerd socket (see volumes below).
      DOCKER_HOST: "${DOCKER_HOST:-unix:///var/run/docker.sock}"
    volumes:
      # Large scratch workspace on the runner's disk (persist only what matters
      # back to the hub as artifacts).
      - runner-workspace:/workspace
      # --- Guest Docker access (pick ONE; verify dstack app-compose policy) -----
      # Option A (default here): mount the *guest* CVM docker socket so the runner
      # can `docker build` against the guest dockerd. You own this socket inside
      # the CVM — it is NOT the bare-metal host socket.
      - /var/run/docker.sock:/var/run/docker.sock
      # Option B: a rootless DinD sidecar instead of the socket mount (safer if
      # the dstack app-compose parser restricts socket mounts). See DEPLOY-DSTACK.md.
    # Bound each build inside the CVM. The hard ceiling is set at CVM create.
    cpus: "2.0"
    mem_limit: "4g"

volumes:
  hub-data:
  runner-workspace:
