# dstack overlay — applies ONLY the dstack/Intel-TDX specifics on top of the
# portable base (../../docker-compose.yml). Render the final, single app-compose
# that dstack measures with:
#
#   docker compose -f docker-compose.yml -f deploy/dstack/docker-compose.dstack.yml config > app-compose.yml
#
# dstack specifics encoded here:
#   1. Images pinned by @sha256: DIGEST (REQUIRED — attestation measures the
#      compose text; a mutable tag would not bind the bytes). Placeholders below
#      are filled from CI digests. See ./README.md.
#   2. Hub on container :80 behind dstack-gateway → NO bundled proxy (the base
#      `proxy` profile stays off; gateway terminates TLS).
#   3. APPLY = dstack UpgradeApp (not compose pull / Watchtower); the host-side
#      self-update APPLY is disabled (UPDATE_APPLY_ENABLED=0). The update CHECK
#      stays informational. See ./README.md.
#   4. Guest-docker socket mount for per-run `docker build` (you own the guest
#      dockerd inside the CVM). Verify the app-compose parser allows it; else use
#      a rootless DinD sidecar.

services:
  hub:
    # REPLACE_WITH_DIGEST — paste the CI-emitted digest (64 hex chars).
    image: ghcr.io/yolo-maxi/runyard-hub@sha256:REPLACE_WITH_HUB_DIGEST
    environment:
      # dstack-gateway proxies to container :80 by default.
      PORT: "80"
      # Set to your app's gateway hostname.
      BASE_URL: "${BASE_URL:-https://APP_ID.gateway.attestmesh.xyz}"
      # On dstack, APPLY = UpgradeApp. Disable the host-side self-update apply.
      UPDATE_APPLY_ENABLED: "0"
    ports: !override
      - "80:80"

  runner:
    # REPLACE_WITH_DIGEST — paste the CI-emitted digest (64 hex chars).
    image: ghcr.io/yolo-maxi/runyard-runner@sha256:REPLACE_WITH_RUNNER_DIGEST
    environment:
      # The runner reaches the hub on the same CVM/compose by service name.
      SMITHERS_HUB_URL: "${SMITHERS_HUB_URL:-http://hub:80}"
      # Guest CVM docker socket (you own it inside the CVM — not the host socket).
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      # Per-run `docker build` against the guest dockerd. Verify parser policy.
      - /var/run/docker.sock:/var/run/docker.sock
