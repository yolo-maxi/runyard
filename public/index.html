<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runyard Console</title>
    <link rel="stylesheet" href="/public/styles.css" />
    <link rel="stylesheet" href="/public/vendor/highlight.css" />
    <link rel="stylesheet" href="/public/vendor/reactflow.css" />
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span class="brand-name">Runyard</span><span class="brand-pill" title="Runyard Hub — the control plane">Hub</span></div>
      <nav class="mobile-primary-nav" aria-label="Primary navigation">
        <a href="#runs" data-primary-view="home">Runs</a>
        <a href="#workflows" data-primary-view="workflows">Workflows</a>
        <a href="#agents/agents" data-primary-view="agents">Agents</a>
      </nav>
      <nav class="nav" aria-label="Support and admin">
        <a class="button support-link" href="/docs#deep-links" title="Every URL in the Hub is shareable — see Docs.">Docs</a>
        <a class="button support-link" href="/llms.txt">llms.txt</a>
        <details class="admin-menu" id="admin-menu">
          <summary class="button" aria-haspopup="true"><span class="admin-label-full">Admin</span><span class="admin-label-short">More</span> <span aria-hidden="true">▾</span></summary>
          <div class="admin-menu-list" role="menu">
            <a class="mobile-menu-only" href="/docs#deep-links" role="menuitem">Docs</a>
            <a class="mobile-menu-only" href="/llms.txt" role="menuitem">llms.txt</a>
            <button data-view="connect" type="button">Connect</button>
            <button data-view="approvals" type="button">Approvals</button>
            <button data-view="tokens" type="button">Tokens</button>
            <button data-view="runners" type="button">Runners</button>
            <button data-view="audit" type="button">Audit</button>
            <button data-view="settings" type="button">Settings</button>
          </div>
        </details>
        <button id="logout">Logout</button>
      </nav>
    </header>
    <main id="login" class="login hidden">
      <section class="panel">
        <h1>Access Token</h1>
        <p class="muted">Use a Runyard access token issued by this machine. The first token is written to <code>data/bootstrap-token.txt</code> on server start.</p>
        <form id="login-form" class="form-grid">
          <label>Token <input id="token" autocomplete="current-password" type="password" /></label>
          <button class="primary" type="submit">Login</button>
        </form>
      </section>
    </main>
    <main id="app" class="shell hidden">
      <nav class="sidebar" aria-label="Primary navigation">
        <button data-view="home" class="active">Runs</button>
        <button data-view="workflows">Workflows</button>
        <button data-view="agents">Agents</button>
      </nav>
      <section id="content" class="content"></section>
    </main>
    <script type="module" src="/public/app.js"></script>
  </body>
</html>
