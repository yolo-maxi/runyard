name: Build & Push Container Images (GHCR)

# On a pushed v* tag, after tests pass, build and push both RunYard images to
# GHCR and emit their @sha256: digests so the operator can paste them into the
# dstack docker-compose for an UpgradeApp. dstack measures the compose text, so
# images MUST be referenced by digest — this workflow is where digests are minted.
#
# The existing test gate lives in release.yml (job `test`). This workflow runs
# its own identical test gate as `needs:` so a red run never publishes an image.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-assert the test gate here so this workflow is self-contained: images are
  # only built after `pnpm test` is green.
  test:
    name: Test (node 22 + pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build-push:
    name: Build & push ${{ matrix.name }}
    needs: test
    # Only publish for pushed v* tags (workflow_dispatch builds without pushing).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hub
            dockerfile: Dockerfile.hub
            image: ghcr.io/yolo-maxi/runyard-hub
          - name: runner
            dockerfile: Dockerfile.runner
            image: ghcr.io/yolo-maxi/runyard-runner
    outputs:
      hub-digest: ${{ steps.export.outputs.hub-digest }}
      runner-digest: ${{ steps.export.outputs.runner-digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          labels: |
            org.opencontainers.image.title=runyard-${{ matrix.name }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # The digest is what the dstack compose must pin. Expose it per-matrix-leg.
      - name: Export digest to job output
        id: export
        run: echo "${{ matrix.name }}-digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Write digest to job summary
        run: |
          {
            echo "### runyard-${{ matrix.name }} image"
            echo ""
            echo '```'
            echo "${{ matrix.image }}@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Collect both digests into a single release artifact + summary block the
  # operator pastes straight into docker-compose.yml for the UpgradeApp.
  digests:
    name: Emit compose digests
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compose pin snippet
        env:
          HUB_DIGEST: ${{ needs.build-push.outputs.hub-digest }}
          RUNNER_DIGEST: ${{ needs.build-push.outputs.runner-digest }}
        run: |
          mkdir -p dist
          {
            echo "# Paste these digest-pinned refs into docker-compose.yml (${{ github.ref_name }})"
            echo "hub:    ghcr.io/yolo-maxi/runyard-hub@${HUB_DIGEST}"
            echo "runner: ghcr.io/yolo-maxi/runyard-runner@${RUNNER_DIGEST}"
          } | tee dist/dstack-image-digests.txt
          {
            echo "## dstack image digests — ${{ github.ref_name }}"
            echo ""
            echo "Paste into \`docker-compose.yml\`, then UpgradeApp:"
            echo '```yaml'
            echo "  hub:"
            echo "    image: ghcr.io/yolo-maxi/runyard-hub@${HUB_DIGEST}"
            echo "  runner:"
            echo "    image: ghcr.io/yolo-maxi/runyard-runner@${RUNNER_DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digests artifact
        uses: actions/upload-artifact@v4
        with:
          name: dstack-image-digests
          path: dist/dstack-image-digests.txt
