name: CI & Release

# Three responsibilities:
#  1. Gate: run `pnpm test` on every PR and every push to main.
#  2. Sandbox gate: prove the RUNNER_SANDBOX=bubblewrap path works for real —
#     bwrap installed, the repo's narrow AppArmor profile loaded via the SAME
#     script operators run, and the userns smoke forced on (no silent skip).
#  3. Release: on a pushed v* tag, run the same gates and ONLY publish the
#     GitHub Release if they pass. A red run must never publish a release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege by default; the release job opts into contents: write.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (node 22 + pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Telegram approval visuals shell out to ImageMagick's `convert`
      # (telegramApprovalVisual.js); production hosts have it, ubuntu-latest
      # runners do not. Install it so the visual-attachment tests exercise the
      # real path instead of failing with spawn ENOENT.
      - name: Install ImageMagick (approval visuals)
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Run tests
        run: pnpm test

      - name: Build assets
        run: pnpm build

  # Real-bubblewrap integration gate. The unit suite proves the generated argv
  # structurally; this job proves it on a real Ubuntu kernel with the userns
  # restriction handled the way we tell operators to handle it:
  #   1. install bubblewrap,
  #   2. load the narrow AppArmor profile via deploy/apparmor/install.sh
  #      (dogfoods the operator install path, including its built-in verify
  #      that an unprivileged user can now create a userns via bwrap),
  #   3. run the sandbox + AppArmor suites with RUNYARD_REQUIRE_BWRAP=1 so the
  #      real-bwrap smoke FAILS instead of skipping if the path regresses.
  # The runner VM is ephemeral — loading the profile mutates nothing durable.
  # No pnpm install: these suites' import graph is node: builtins only.
  sandbox-smoke:
    name: Sandbox smoke (bwrap + userns + AppArmor)
    # Pinned, not ubuntu-latest: deploy/apparmor/bwrap targets abi <abi/4.0>,
    # which needs AppArmor >= 4 (Ubuntu 24.04).
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Load AppArmor userns profile (operator install path)
        run: sudo ./deploy/apparmor/install.sh

      - name: Run sandbox suites with real-bwrap smoke required
        run: RUNYARD_REQUIRE_BWRAP=1 node --test tests/runner-sandbox.test.js tests/apparmor-profile.test.js

  release:
    name: Publish GitHub Release
    needs: [test, sandbox-smoke]
    # Only for pushed v* tags, and only after the test job is green (needs: test).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # 4. Docs currency: after the release publishes, trigger the Hub's
  #    docs-update workflow through its authenticated workflow endpoint. The
  #    workflow inspects only the git diff between the previous and released
  #    tags and proposes docs updates (approval-gated before anything lands).
  #    Required repo secret: RUNYARD_DOCS_UPDATE_ENDPOINT_SECRET (the seeded
  #    release-docs-update endpoint secret, written on the Hub to
  #    data/workflow-endpoints/release-docs-update-secret.txt).
  #    Optional repo variable: RUNYARD_DOCS_UPDATE_ENDPOINT_URL to point at a
  #    different Hub. This job fails loudly — never silently — when the
  #    trigger is missing or rejected, without unpublishing the release.
  docs-update:
    name: Trigger docs-update workflow
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Runyard docs-update workflow
        env:
          ENDPOINT_URL: ${{ vars.RUNYARD_DOCS_UPDATE_ENDPOINT_URL || 'https://runyard.repo.box/api/workflow-endpoints/release-docs-update' }}
          ENDPOINT_SECRET: ${{ secrets.RUNYARD_DOCS_UPDATE_ENDPOINT_SECRET }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "$ENDPOINT_SECRET" ]; then
            echo "::error::RUNYARD_DOCS_UPDATE_ENDPOINT_SECRET is not configured, so the release docs-update workflow was NOT triggered. Add the secret (from data/workflow-endpoints/release-docs-update-secret.txt on the Hub) or remove this job."
            exit 1
          fi
          payload=$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg repo "$REPOSITORY" \
            --arg url "https://github.com/$REPOSITORY/releases/tag/$RELEASE_TAG" \
            '{title: ("Docs update for " + $tag), release: {tag_name: $tag, html_url: $url}, repository: {full_name: $repo}}')
          echo "Triggering docs-update for $RELEASE_TAG"
          response=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $ENDPOINT_SECRET" \
            -H "content-type: application/json" \
            -d "$payload" \
            "$ENDPOINT_URL")
          echo "$response" | jq '{run: (.run.id // null), status: (.run.status // .status // null), deduped: (.deduped // false)}'
